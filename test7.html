<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>에타 스타일 + 지역 왼쪽 고정</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f6f8;
}

/* 전체 레이아웃 */
.wrap {
  display: flex;
}

/* 왼쪽 (고정) */
.sidebar {
  width: 250px;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  overflow-y: auto;
  background: white;
  border-right: 1px solid #ddd;
  padding: 20px;
}

/* 메인 영역 */
.main {
  margin-left: 250px;
  padding: 20px;
  width: 100%;
}

/* 지역 리스트 */
.location {
  margin-top: 20px;
}

.location div {
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.location div:hover {
  background: #f0f0f0;
}

/* 카드 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #ddd;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: red;
}

/* 버튼 */
.btn {
  margin-top: 10px;
  background: red;
  color: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="wrap">

  <!-- 왼쪽 -->
  <div class="sidebar">
    <h2>지역 선택</h2>

    <div class="location">
      <div onclick="go('gangnam')">강남</div>
      <div onclick="go('dongdaemun')">동대문</div>
      <div onclick="go('yeongdeungpo')">영등포</div>
      <div onclick="go('jongno')">종로</div>
      <div onclick="go('sillim')">신림</div>
      <div onclick="go('hwagok')">화곡</div>
      <div onclick="go('songpa')">송파</div>
      <div onclick="go('hongdae')">홍대</div>
      <div onclick="go('seongsu')">성수</div>
    </div>
  </div>

  <!-- 메인 -->
  <div class="main">

    <h1>지점 선택</h1>

    <div class="grid">

      <div class="card" onclick="go('gangnam')">
        <h3>강남</h3>
        <p>강남 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('dongdaemun')">
        <h3>동대문</h3>
        <p>동대문 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('yeongdeungpo')">
        <h3>영등포</h3>
        <p>영등포 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('jongno')">
        <h3>종로</h3>
        <p>종로 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('sillim')">
        <h3>신림</h3>
        <p>신림 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('hwagok')">
        <h3>화곡</h3>
        <p>화곡 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('songpa')">
        <h3>송파</h3>
        <p>송파 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('hongdae')">
        <h3>홍대</h3>
        <p>홍대 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

      <div class="card" onclick="go('seongsu')">
        <h3>성수</h3>
        <p>성수 커뮤니티</p>
        <div class="btn">입장하기</div>
      </div>

    </div>

  </div>

</div>

<script>
function go(location) {
  window.location.href = location + ".html";
}
</script>

</body>
</html>
